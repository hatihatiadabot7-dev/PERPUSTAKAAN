<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit User - Sistem Peminjaman Buku SIPUSTAKA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen">
    <div class="min-h-screen flex flex-col md:flex-row">
      <aside class="w-full md:w-72 md:h-screen bg-slate-950 text-slate-100 flex-none flex flex-col">
        <div class="px-6 py-7 border-b border-slate-800">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-500 to-sky-400 flex items-center justify-center shadow-lg">
              <span class="text-xl font-bold text-white">P</span>
            </div>
            <div>
              <p class="text-sm uppercase text-slate-400 tracking-[0.25em]">SIPUSTAKA</p>
              <h1 class="text-xl font-semibold">Sistem Peminjaman Buku</h1>
            </div>
          </div>
        </div>
        <nav class="space-y-1 px-4 py-4 flex-1 overflow-y-auto">
          <a href="/" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition"> <span class="material-icons-outlined">dashboard</span> Dashboard </a>
          <a href="/buku/" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition"> <span class="material-icons-outlined">book</span> Data Buku </a>
          <a href="/users/" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-white bg-slate-900 shadow-inner"> <span class="material-icons-outlined">people</span> Data Siswa </a>
          <a href="/peminjaman/" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition">
            <span class="material-icons-outlined">assignment</span> Peminjaman Buku
          </a>
        </nav>
      </aside>

      <main class="flex-1 overflow-y-auto p-6 md:p-8">
        <div class="max-w-2xl mx-auto">
          <div class="mb-6 flex items-center gap-3">
            <a href="/users/" class="p-2 bg-white rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition">
              <span class="material-icons-outlined block text-sm">arrow_back</span>
            </a>
            <div>
              <p class="text-slate-500 text-sm">Kelola User / Ubah Data</p>
              <h3 class="text-2xl font-semibold text-slate-900">Edit Data Siswa</h3>
            </div>
          </div>

          <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
            <form method="POST">
              {% csrf_token %}
              <div class="space-y-5">
                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Lengkap Siswa</label>
                  <input
                    type="text"
                    name="nama"
                    value="{{ siswa.nama }}"
                    required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 transition outline-none"
                    placeholder="Masukkan nama lengkap..."
                  />
                </div>

                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-2">Kelas</label>
                  <input
                    type="text"
                    name="kelas"
                    value="{{ siswa.kelas }}"
                    required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 transition outline-none"
                    placeholder="Contoh: XII RPL 1"
                  />
                </div>

                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-2">Nomor Induk Siswa (NIS)</label>
                  <input
                    type="text"
                    name="nis"
                    value="{{ siswa.nis }}"
                    required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 transition outline-none"
                    placeholder="Masukkan nomor NIS..."
                  />
                </div>

                <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-3">
                  <a href="/users/" class="px-5 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition">Batal</a>
                  <button type="submit" class="px-5 py-2.5 rounded-xl bg-brand-600 text-sm font-semibold text-white hover:bg-brand-700 shadow-sm transition">Simpan Perubahan</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
