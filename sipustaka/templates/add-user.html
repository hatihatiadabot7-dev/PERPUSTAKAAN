<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah User - SIPUSTAKA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen">
    <div class="min-h-screen flex flex-col md:flex-row">
      <aside class="w-full md:w-72 md:h-screen bg-slate-950 text-slate-100 flex-none flex flex-col">
        <div class="px-6 py-7 border-b border-slate-800">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-500 to-sky-400 flex items-center justify-center shadow-lg shadow-slate-900/25">
              <span class="text-xl font-bold">P</span>
            </div>
            <div>
              <p class="text-sm uppercase text-slate-400 tracking-[0.25em]">SIPUSTAKA</p>
              <h1 class="text-xl font-semibold">Sistem Peminjaman Buku</h1>
            </div>
          </div>
        </div>
        <nav class="space-y-1 px-4 py-4 flex-1">
          <a href="/" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition"> <span class="material-icons-outlined">dashboard</span> Dashboard </a>
          <a href="/buku/" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition"> <span class="material-icons-outlined">book</span> Data Buku </a>
          <a href="/users/" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-white bg-slate-900 shadow-inner"> <span class="material-icons-outlined">people</span> Data Siswa </a>
          <a href="/peminjaman/" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition">
            <span class="material-icons-outlined">assignment</span> Peminjaman Buku
          </a>
        </nav>
        <div class="mt-auto px-6 pb-6">
          <div class="rounded-3xl bg-slate-900 p-5 shadow-xl shadow-slate-900/20">
            <p class="text-sm text-slate-400">Admin Aktif</p>
            <p class="mt-2 font-semibold text-white">Aisy Arkaan Abdurahman</p>
          </div>
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-6 md:p-8 flex items-center justify-center">
        <div class="w-full max-w-xl bg-white rounded-3xl p-6 md:p-8 shadow-lg shadow-slate-200/60 border border-slate-200">
          <div class="flex items-center gap-4 mb-6">
            <a href="/users/" class="w-10 h-10 rounded-xl border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-50 transition">
              <span class="material-icons-outlined text-xl">arrow_back</span>
            </a>
            <div>
              <p class="text-slate-500 text-sm">Tambahkan user perpustakaan baru.</p>
              <h3 class="text-2xl font-bold text-slate-900">Tambah User Baru</h3>
            </div>
          </div>

          <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap Siswa</label>
              <input type="text" name="nama" required placeholder="Masukkan nama lengkap..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500 transition" />
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Kelas</label>
              <input type="text" name="kelas" required placeholder="Contoh: XII RPL 1" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500 transition" />
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Nomor Induk Siswa (NIS)</label>
              <input type="text" name="nis" required placeholder="Masukkan nomor NIS..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500 transition" />
            </div>

            <input type="hidden" name="status" value="True" />

            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
              <a href="/users/" class="px-5 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 transition"> Batal </a>
              <button type="submit" class="px-5 py-2.5 rounded-xl bg-brand-600 text-white text-sm font-semibold hover:bg-brand-700 shadow-md transition">Simpan User</button>
            </div>
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
